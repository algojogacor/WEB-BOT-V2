<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>AlgojoGacor — Nation v3.0</title>
  <link rel="stylesheet" href="/css/main.css"/>
  <link rel="stylesheet" href="/css/dashboard.css"/>
  <style>
    /* ── NATION CUSTOM STYLES ── */
    .nation-tabs { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:20px; border-bottom:2px solid var(--border); padding-bottom:0; }
    .ntab { padding:9px 16px; cursor:pointer; border-radius:8px 8px 0 0; font-weight:600; font-size:12px; color:var(--text-secondary); border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .2s; white-space:nowrap; }
    .ntab.active { color:var(--accent-gold,#f39c12); border-bottom-color:var(--accent-gold,#f39c12); background:rgba(243,156,18,.08); }
    .ntab-pane { display:none; } .ntab-pane.active { display:block; }

    .nation-header { background:linear-gradient(135deg,rgba(39,174,96,.12),rgba(41,128,185,.12)); border:1px solid rgba(39,174,96,.25); border-radius:16px; padding:24px; margin-bottom:20px; }
    .nation-title { font-size:22px; font-weight:800; margin-bottom:4px; }
    .nation-subtitle { color:var(--text-secondary); font-size:13px; }
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin-top:16px; }
    .stat-box { background:var(--card-bg); border:1px solid var(--border); border-radius:10px; padding:12px; text-align:center; }
    .stat-val { font-size:18px; font-weight:800; color:var(--accent-green); }
    .stat-val.danger { color:#e74c3c; }
    .stat-val.warn { color:#f39c12; }
    .stat-lbl { font-size:11px; color:var(--text-secondary); margin-top:3px; }

    .progress-bar { height:8px; background:var(--border); border-radius:4px; overflow:hidden; margin:6px 0 2px; }
    .progress-fill { height:100%; border-radius:4px; transition:width .3s; background:var(--accent-green); }
    .progress-fill.warn { background:#f39c12; }
    .progress-fill.danger { background:#e74c3c; }

    .infra-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:14px; }
    .infra-card { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:16px; }
    .infra-card.maxed { border-color:var(--accent-green); background:rgba(57,197,87,.04); }
    .infra-name { font-weight:700; font-size:14px; margin-bottom:4px; }
    .infra-efek { font-size:11px; color:var(--text-secondary); margin-bottom:10px; line-height:1.5; }
    .infra-lv { font-size:12px; margin-bottom:8px; }
    .lv-bar { display:flex; gap:3px; margin-bottom:8px; }
    .lv-dot { width:14px; height:14px; border-radius:3px; background:var(--border); }
    .lv-dot.filled { background:var(--accent-green); }
    .lv-dot.current { background:#f39c12; }

    .riset-card { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:14px; }
    .riset-card.done { border-color:var(--accent-green); background:rgba(57,197,87,.04); }
    .riset-card.locked { opacity:.6; }

    .nation-card { background:var(--card-bg); border:1px solid var(--border); border-radius:14px; padding:18px; margin-bottom:16px; }
    .nation-card h3 { font-size:14px; font-weight:700; margin-bottom:14px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.5px; }

    .war-item { display:flex; align-items:center; gap:10px; padding:10px; background:var(--bg-secondary); border-radius:8px; margin-bottom:8px; }
    .war-result { font-size:11px; font-weight:700; padding:3px 8px; border-radius:10px; }
    .war-result.MENANG { background:rgba(39,174,96,.2); color:#27ae60; }
    .war-result.KALAH  { background:rgba(231,76,60,.2); color:#e74c3c; }

    .top-row { display:grid; grid-template-columns:40px 1fr auto; gap:10px; align-items:center; padding:10px; background:var(--bg-secondary); border-radius:8px; margin-bottom:8px; }
    .top-rank { font-size:18px; text-align:center; }
    .top-name { font-weight:700; font-size:14px; }
    .top-meta { font-size:11px; color:var(--text-secondary); }
    .top-power { font-size:13px; font-weight:700; color:var(--accent-green); text-align:right; white-space:nowrap; }

    .spy-card { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:14px; }
    .spy-card.locked { opacity:.55; }
    .spy-result-box { background:rgba(155,89,182,.08); border:1px solid rgba(155,89,182,.3); border-radius:10px; padding:14px; margin-top:12px; }
    .spy-log-item { display:flex; gap:10px; padding:8px; border-bottom:1px solid var(--border); font-size:12px; }
    .spy-log-item:last-child { border-bottom:none; }

    .notif-item { display:flex; gap:10px; padding:10px; border-bottom:1px solid var(--border); font-size:12px; align-items:flex-start; }
    .notif-item:last-child { border-bottom:none; }
    .notif-dot { width:8px; height:8px; border-radius:50%; background:#e74c3c; flex-shrink:0; margin-top:4px; }
    .notif-time { color:var(--text-secondary); font-size:11px; }

    .shield-active { background:rgba(39,174,96,.1); border:1px solid rgba(39,174,96,.3); border-radius:8px; padding:8px 12px; font-size:12px; color:#27ae60; display:inline-flex; align-items:center; gap:6px; }
    .blockade-active { background:rgba(231,76,60,.1); border:1px solid rgba(231,76,60,.3); border-radius:8px; padding:8px 12px; font-size:12px; color:#e74c3c; display:inline-flex; align-items:center; gap:6px; }

    .btn-sm2 { padding:6px 12px; font-size:12px; border-radius:6px; }
    .btn-red { background:#e74c3c; color:#fff; border:none; cursor:pointer; }
    .btn-red:hover { background:#c0392b; }
    .btn-orange { background:#e67e22; color:#fff; border:none; cursor:pointer; }
    .btn-orange:hover { background:#d35400; }
    .btn-purple { background:#9b59b6; color:#fff; border:none; cursor:pointer; }
    .btn-purple:hover { background:#8e44ad; }
    .btn-nuke { background:linear-gradient(135deg,#e74c3c,#c0392b); color:#fff; border:none; cursor:pointer; animation:pulse-nuke 2s infinite; }
    @keyframes pulse-nuke { 0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.4)} 50%{box-shadow:0 0 0 6px rgba(231,76,60,0)} }

    .form-row { display:flex; gap:8px; margin-bottom:10px; align-items:flex-end; flex-wrap:wrap; }
    .form-col { display:flex; flex-direction:column; gap:4px; }
    .form-col label { font-size:11px; color:var(--text-secondary); }
    .form-col input, .form-col select { padding:8px 10px; background:var(--input-bg); border:1px solid var(--border); border-radius:8px; color:var(--text-primary); font-size:13px; min-width:160px; }

    .cd-badge { font-size:11px; color:var(--text-secondary); background:var(--bg-secondary); padding:2px 7px; border-radius:10px; }
    .cd-badge.ready { color:#27ae60; background:rgba(39,174,96,.1); }

    .no-nation-screen { text-align:center; padding:60px 20px; }
    .no-nation-screen .big-icon { font-size:72px; margin-bottom:16px; }
    .no-nation-screen h2 { font-size:20px; font-weight:800; margin-bottom:8px; }
    .ally-item { display:flex; justify-content:space-between; align-items:center; padding:10px; background:var(--bg-secondary); border-radius:8px; margin-bottom:8px; }
    .pending-item { display:flex; justify-content:space-between; align-items:center; padding:10px; border:1px solid var(--accent-gold,#f39c12); border-radius:8px; margin-bottom:8px; background:rgba(243,156,18,.05); }
  </style>
</head>
<body>
<div class="app-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
   <div id="sidebar-container"></div>
  </aside>
  <div class="main-content">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <span class="topbar-title">🌍 Nation v3.0</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="notif-badge" class="cd-badge" style="cursor:pointer" onclick="switchTab('notif')">🔔 0</span>
        <button class="btn btn-secondary btn-sm" onclick="load()">↻ Refresh</button>
      </div>
    </header>
    <main class="content-area">
      <div id="main-content"></div>
    </main>
  </div>
</div>
<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/component/sidebarFetch.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let nation = null;
let config = null;
let topList = [];
let notifList = [];
let currentTab = 'dashboard';

// const fmt = (n) => Math.floor(Number(n)||0).toLocaleString('id-ID');
// const fmtPct = (n) => `${Math.min(100,Math.max(0,Math.round(n||0)))}%`;
// const bar = (v,max=100,len=10) => { const f=Math.round((Math.min(v,max)/max)*len); return '█'.repeat(Math.max(0,f))+'░'.repeat(Math.max(0,len-f)); };

// ═══════════════════════════════════════════════════════════════
// LOAD DATA
// ═══════════════════════════════════════════════════════════════
async function load() {
  try {
    const r = await api.get('/features/nation');
    nation = r.nation;
    config = r.config;
  } catch(e) { showToast('error', e.message); }

  try {
    const r2 = await api.get('/features/nation/top');
    topList = r2.list || [];
  } catch(e) {}

  try {
    const r3 = await api.get('/features/nation/notifications');
    notifList = r3.notifikasi || [];
  } catch(e) {}

  const unread = notifList.length;
  const badge = document.getElementById('notif-badge');
  if (badge) badge.textContent = `🔔 ${unread}`;
  if (badge) badge.className = 'cd-badge' + (unread > 0 ? '' : ' ready');

  render();
}

// ═══════════════════════════════════════════════════════════════
// RENDER UTAMA
// ═══════════════════════════════════════════════════════════════
function render() {
  const container = document.getElementById('main-content');

  if (!nation) {
    container.innerHTML = renderNoNation();
    return;
  }

  container.innerHTML = `
    ${renderHeader()}
    <div class="nation-tabs">
      ${['dashboard','infrastruktur','militer','ekonomi','diplomasi','intelijen','peta-dunia','notif'].map(t => `
        <div class="ntab ${currentTab===t?'active':''}" onclick="switchTab('${t}')">
          ${tabIcon(t)} ${tabLabel(t)}
        </div>`).join('')}
    </div>
    <div id="tab-content">
      ${renderTabContent()}
    </div>
  `;
}

function switchTab(t) {
  currentTab = t;
  render();
  window.scrollTo(0,0);
}

function tabIcon(t) {
  return { dashboard:'📊', infrastruktur:'🏗️', militer:'⚔️', ekonomi:'💰', diplomasi:'🤝', intelijen:'🕵️', 'peta-dunia':'🌍', notif:'🔔' }[t] || '';
}

function tabLabel(t) {
  return { dashboard:'Dashboard', infrastruktur:'Infrastruktur', militer:'Militer', ekonomi:'Ekonomi', diplomasi:'Diplomasi', intelijen:'Intelijen', 'peta-dunia':'Peta Dunia', notif:'Notifikasi' }[t] || t;
}

function renderTabContent() {
  switch(currentTab) {
    case 'dashboard': return renderDashboard();
    case 'infrastruktur': return renderInfrastruktur();
    case 'militer': return renderMiliter();
    case 'ekonomi': return renderEkonomi();
    case 'diplomasi': return renderDiplomasi();
    case 'intelijen': return renderIntelijen();
    case 'peta-dunia': return renderPetaDunia();
    case 'notif': return renderNotif();
    default: return '';
  }
}

// ═══════════════════════════════════════════════════════════════
// RENDER: NO NATION
// ═══════════════════════════════════════════════════════════════
function renderNoNation() {
  const biaya = config?.biayaBerdiri || 5_000_000_000;
  return `
    <div class="no-nation-screen">
      <div class="big-icon">🌍</div>
      <h2>Sistem Nation v3.0</h2>
      <p style="color:var(--text-secondary);margin:8px 0 20px">Bangun negara, perkuat militer, serang musuh, jalin aliansi!</p>
      <div class="nation-card" style="max-width:480px;margin:0 auto;text-align:left">
        <h3>💸 BIAYA MENDIRIKAN NEGARA</h3>
        <p style="color:var(--accent-green);font-size:20px;font-weight:800">Rp ${fmt(biaya)}</p>
        <p style="font-size:12px;color:var(--text-secondary);margin:8px 0 16px">Termasuk kas awal Rp 2.000.000.000 untuk modal pertama</p>
        <div class="form-row">
          <div class="form-col" style="flex:1">
            <label>Nama Negara (maks 25 karakter)</label>
            <input id="inp-nama" placeholder="contoh: Nusantara Jaya" maxlength="25"/>
          </div>
          <button class="btn btn-primary" onclick="doCreate()">🚀 Dirikan!</button>
        </div>
      </div>
      <div style="margin-top:24px">
        <h3 style="margin-bottom:12px">🌍 Peta Kekuatan Dunia (${topList.length} Negara)</h3>
        ${renderPetaDunia()}
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: HEADER
// ═══════════════════════════════════════════════════════════════
function renderHeader() {
  if (!nation) return '';
  const stabColor = nation.stability >= 70 ? 'var(--accent-green)' : nation.stability >= 40 ? '#f39c12' : '#e74c3c';
  const stabClass = nation.stability >= 70 ? '' : nation.stability >= 40 ? 'warn' : 'danger';

  let badges = '';
  if (nation.perisaiOn) badges += `<span class="shield-active">🛡️ Perisai Aktif</span>`;
  if (nation.diblokOn)  badges += `<span class="blockade-active" style="margin-left:8px">⛔ Diblokade</span>`;

  return `
    <div class="nation-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
        <div>
          <div class="nation-title">🏛️ Republik ${nation.name.toUpperCase()}</div>
          <div class="nation-subtitle">Ranking #${nation.rank} dari ${nation.total} negara · Power: ${fmt(nation.power)}</div>
          <div style="margin-top:8px">${badges}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:24px;font-weight:800;color:var(--accent-green)">Rp ${fmt(nation.treasury)}</div>
          <div style="font-size:11px;color:var(--text-secondary)">Kas Negara</div>
        </div>
      </div>
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-val">${fmt(nation.population)}</div>
          <div class="stat-lbl">👥 Penduduk</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${fmt(nation.defense)}</div>
          <div class="stat-lbl">⚔️ Tentara</div>
        </div>
        <div class="stat-box">
          <div class="stat-val ${stabClass}">${nation.stability}%</div>
          <div class="stat-lbl">📊 Stabilitas</div>
          <div class="progress-bar"><div class="progress-fill ${stabClass}" style="width:${nation.stability}%"></div></div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${nation.rudal}</div>
          <div class="stat-lbl">🚀 Rudal</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${nation.bomNuklir}</div>
          <div class="stat-lbl">☢️ Bom Nuklir</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${nation.winRate}%</div>
          <div class="stat-lbl">🏆 Win Rate (${nation.totalMenang}M/${nation.totalKalah}K)</div>
        </div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: DASHBOARD TAB
// ═══════════════════════════════════════════════════════════════
function renderDashboard() {
  const pajak = fmt(nation.pajak);
  const bangunanAktif = config.bangunan.filter(b => b.curLv > 0);
  const risetAktif = config.riset.filter(r => r.sudah);

  // War log
  const warLog = (nation.warLog || []).slice().reverse().slice(0,5);

  // Sekutu
  const sekutu = nation.sekutu || [];

  return `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">
      <!-- Keuangan -->
      <div class="nation-card">
        <h3>💰 Keuangan</h3>
        <div style="font-size:13px;line-height:1.8">
          <div>Kas: <b>Rp ${fmt(nation.treasury)}</b></div>
          <div>Est. Pajak/sesi: <b>Rp ${pajak}</b></div>
          <div>Total Pajak: <b>Rp ${fmt(nation.totalPajak)}</b></div>
          ${nation.diblokOn ? `<div style="color:#e74c3c">⛔ Diblokade: Pajak -50%</div>` : ''}
        </div>
        <div style="margin-top:12px">
          <span class="cd-badge ${!nation.cdPajak?'ready':''}">
            ${!nation.cdPajak ? '✅ Siap Pungut Pajak' : `⏳ Pajak: ${nation.cdPajakStr}`}
          </span>
        </div>
      </div>

      <!-- Militer -->
      <div class="nation-card">
        <h3>⚔️ Kekuatan Militer</h3>
        <div style="font-size:13px;line-height:1.8">
          <div>Tentara: <b>${fmt(nation.defense)}</b></div>
          <div>Power Rating: <b>${fmt(nation.power)}</b></div>
          <div>Rudal: <b>${nation.rudal}</b> | Bom Nuklir: <b>${nation.bomNuklir}</b></div>
          <div>Rekam Perang: <b>${nation.totalMenang}M / ${nation.totalKalah}K</b></div>
        </div>
        <div style="margin-top:8px">
          <span class="cd-badge ${!nation.cdSerang?'ready':''}">
            ${!nation.cdSerang ? '✅ Siap Menyerang' : `⏳ Serang: ${nation.cdSerangStr}`}
          </span>
        </div>
      </div>

      <!-- Bangunan Aktif -->
      <div class="nation-card">
        <h3>🏗️ Infrastruktur Aktif</h3>
        ${bangunanAktif.length === 0 ? '<div style="color:var(--text-secondary);font-size:12px">Belum ada bangunan</div>' :
          bangunanAktif.map(b => `<div style="font-size:12px;margin-bottom:4px">${b.nama} <b>Lv.${b.curLv}</b></div>`).join('')
        }
      </div>

      <!-- Riset Aktif -->
      <div class="nation-card">
        <h3>🔬 Teknologi Aktif</h3>
        ${risetAktif.length === 0 ? '<div style="color:var(--text-secondary);font-size:12px">Belum ada riset</div>' :
          risetAktif.map(r => `<div style="font-size:12px;margin-bottom:4px">✅ ${r.nama}</div>`).join('')
        }
      </div>

      <!-- Sekutu -->
      <div class="nation-card">
        <h3>🤝 Sekutu (${sekutu.length}/${nation.aliansi?.length||0})</h3>
        ${sekutu.length === 0 ? '<div style="color:var(--text-secondary);font-size:12px">Tidak ada sekutu</div>' :
          sekutu.map(s => `<div style="font-size:12px;margin-bottom:4px">${s.name} — Power: ${fmt(s.power)}</div>`).join('')
        }
      </div>

      <!-- Riwayat Perang -->
      <div class="nation-card">
        <h3>📜 Riwayat Perang</h3>
        ${warLog.length === 0 ? '<div style="color:var(--text-secondary);font-size:12px">Belum pernah berperang</div>' :
          warLog.map(w => `
            <div class="war-item">
              <div style="flex:1">
                <div style="font-size:12px;font-weight:600">vs ${w.vs}</div>
                <div style="font-size:10px;color:var(--text-secondary)">${new Date(w.time).toLocaleString('id-ID')}</div>
              </div>
              <span class="war-result ${w.result}">${w.result}</span>
            </div>`).join('')
        }
      </div>
    </div>

    <!-- AKSI CEPAT -->
    <div class="nation-card" style="margin-top:16px">
      <h3>⚡ Aksi Cepat</h3>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="switchTab('ekonomi')">💰 Kelola Keuangan</button>
        <button class="btn btn-secondary btn-sm" onclick="switchTab('infrastruktur')">🏗️ Bangun</button>
        <button class="btn btn-secondary btn-sm" onclick="switchTab('militer')">⚔️ Rekrut Tentara</button>
        <button class="btn btn-secondary btn-sm" onclick="switchTab('diplomasi')">🤝 Diplomasi</button>
        <button class="btn btn-secondary btn-sm" onclick="switchTab('intelijen')">🕵️ Misi Rahasia</button>
        <button class="btn btn-secondary btn-sm" onclick="doSensus()">📋 Sensus (Rp 100jt)</button>
        <button class="btn btn-secondary btn-sm" onclick="doRename()">✏️ Rename Negara</button>
        <button class="btn btn-secondary btn-sm" style="color:#e74c3c" onclick="doReset()">🗑️ Hapus Negara</button>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: INFRASTRUKTUR
// ═══════════════════════════════════════════════════════════════
function renderInfrastruktur() {
  const bangunan = config.bangunan || [];
  const riset = config.riset || [];

  return `
    <div class="nation-card">
      <h3>💰 Kas Negara: Rp ${fmt(nation.treasury)}</h3>
      <p style="font-size:12px;color:var(--text-secondary)">Harga naik setiap level. Demolish = refund 50% dari harga level saat ini.</p>
    </div>

    <h3 style="margin:16px 0 10px">🏗️ Bangunan</h3>
    <div class="infra-grid">
      ${bangunan.map(b => {
        const maxed = b.curLv >= b.maxLv;
        const dots = Array.from({length: b.maxLv}, (_, i) => `<div class="lv-dot ${i < b.curLv ? 'filled' : ''}"></div>`).join('');
        return `
          <div class="infra-card ${maxed?'maxed':''}">
            <div class="infra-name">${b.nama}</div>
            <div class="infra-efek">${b.efek}</div>
            <div class="lv-bar">${dots}</div>
            <div class="infra-lv">Level: <b>${b.curLv}</b>/${b.maxLv}${maxed?' 🏆 MAX':''}</div>
            <div style="display:flex;gap:6px">
              ${!maxed ? `<button class="btn btn-primary btn-sm" onclick="doBangun('${b.kode}','${b.nama}',${b.hargaNext})">
                🏗️ Bangun — Rp ${fmt(b.hargaNext)}
              </button>` : ''}
              ${b.curLv > 0 ? `<button class="btn btn-secondary btn-sm" onclick="doDemolish('${b.kode}','${b.nama}')">
                🔨 Bongkar
              </button>` : ''}
            </div>
          </div>`;
      }).join('')}
    </div>

    <h3 style="margin:24px 0 10px">🔬 Riset Teknologi</h3>
    <div class="infra-grid">
      ${riset.map(r => `
        <div class="riset-card ${r.sudah?'done':r.locked?'locked':''}">
          <div style="font-weight:700;font-size:13px;margin-bottom:4px">${r.nama}</div>
          <div style="font-size:11px;color:var(--text-secondary);margin-bottom:10px">${r.efek}</div>
          ${r.sudah ? '<div style="color:var(--accent-green);font-size:12px">✅ Sudah diriset</div>' :
            r.locked ? `<div style="font-size:11px;color:#e74c3c">🔒 Butuh Universitas Lv.${r.univ_min}</div>` :
            `<button class="btn btn-primary btn-sm" onclick="doRiset('${r.kode}','${r.nama}',${r.biaya})">
              🔬 Riset — Rp ${fmt(r.biaya)}
            </button>`
          }
        </div>`).join('')}
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
// ACTION FUNCTIONS
// ═══════════════════════════════════════════════════════════════
async function doCreate() {
  const nama = document.getElementById('inp-nama')?.value?.trim();
  if (!nama) return showToast('error','Masukkan nama negara!');
  try {
    const r = await api.post('/features/nation/create', { nama });
    showToast('success', r.message);
    await load();
  } catch(e) { showToast('error', e.message); }
}

async function doBangun(kode, nama, harga) {
  if (!confirm(`Bangun ${nama}?\nBiaya: Rp ${fmt(harga)}\nDari kas negara`)) return;
  try {
    const r = await api.post('/features/nation/build', { kode });
    showToast('success', r.message);
    nation = r.nation; config.bangunan.find(b=>b.kode===kode).curLv++;
    render();
  } catch(e) { showToast('error', e.message); }
}

async function doDemolish(kode, nama) {
  if (!confirm(`Bongkar ${nama}? Refund 50%?`)) return;
  try {
    const r = await api.post('/features/nation/demolish', { kode });
    showToast('success', r.message);
    await load();
  } catch(e) { showToast('error', e.message); }
}

async function doRiset(kode, nama, biaya) {
  if (!confirm(`Riset ${nama}?\nBiaya: Rp ${fmt(biaya)} dari kas negara`)) return;
  try {
    const r = await api.post('/features/nation/research', { kode });
    showToast('success', r.message);
    await load();
  } catch(e) { showToast('error', e.message); }
}

async function doPajak() {
  try {
    const r = await api.post('/features/nation/tax', {});
    showToast('success', r.message.replace(/\n/g,' | '));
    nation = r.nation; render();
  } catch(e) { showToast('error', e.message); }
}

async function doSpy(jenis, nama) {
  const targetUsername = document.getElementById('inp-spy-target')?.value?.trim();
  if (!targetUsername) return showToast('error','Masukkan username target di field atas!');
  if (!confirm(`🕵️ Jalankan misi "${nama}" terhadap ${targetUsername}?`)) return;
  try {
    const r = await api.post('/features/nation/spy', { jenis, targetUsername });
    const box = document.getElementById('spy-result');
    if (box) {
      box.style.display = 'block';
      let html = `<b>${r.message}</b>`;
      if (r.detail && r.sukses) {
        html += '<hr style="border-color:rgba(255,255,255,.1);margin:8px 0"/>';
        if (jenis === 'spionase') {
          html += `<div style="font-size:12px;line-height:1.8">
            💰 Kas: Rp ${fmt(r.detail.kas)}<br>
            ⚔️ Tentara: ${fmt(r.detail.tentara)}<br>
            🏰 Benteng: Lv.${r.detail.benteng} | 🏦 Bank: Lv.${r.detail.bank}<br>
            🕵️ Intel: Lv.${r.detail.intel} | 📡 Radar: Lv.${r.detail.radar}<br>
            🚀 Rudal: ${r.detail.rudal} | ☢️ Bom: ${r.detail.bomNuklir}<br>
            📊 Stabilitas: ${r.detail.stabilitas}% | Perisai: ${r.detail.perisaiOn?'🔒 AKTIF':'🔓 OFF'}<br>
            🔬 Riset: ${r.detail.riset}<br>
            🤝 Aliansi: ${r.detail.aliansi}
          </div>`;
        } else if (jenis === 'sadap') {
          html += `<div style="font-size:12px;line-height:1.8">
            🤝 Sekutu: ${r.detail.sekutu?.join(', ')||'Tidak ada'}<br>
            ⚔️ Serangan terakhir: ${r.detail.lastAttack}<br>
            📊 Total perang: ${r.detail.totalPerang} | WR: ${r.detail.winRate}%<br>
            🏗️ Bangunan: ${r.detail.bangunan?.join(', ')||'Tidak ada'}
          </div>`;
        }
      }
      box.innerHTML = html;
      nation = r.nation;
      render();
    }
  } catch(e) { showToast('error', e.message); }
}

async function loadSpyLog() {
  try {
    const r = await api.get('/features/nation/spy/log');
    const container = document.getElementById('spy-log-container');
    if (!container) return;
    if (!r.logs || r.logs.length === 0) {
      container.innerHTML = '<div style="color:var(--text-secondary);font-size:12px">Belum ada riwayat misi.</div>';
      return;
    }
    container.innerHTML = r.logs.slice(0,15).map(l => `
      <div class="spy-log-item">
        <div>${l.sukses ? '✅' : '❌'}</div>
        <div style="flex:1">
          <b>${l.misiNama}</b> → ${l.targetName}<br>
          <span style="color:var(--text-secondary)">${l.timeStr}</span><br>
          ${l.hasil}
        </div>
      </div>`).join('');
  } catch(e) { showToast('error', e.message); }
}

// Override api.delete helper if needed
if (!api.delete) {
  api.delete = async (url) => {
    const token = getToken();
    const res = await fetch(url, {
      method:'DELETE',
      headers:{ 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    return data;
  };
}
