<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgojoGacor — AI Chat & Image</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .ai-chat-area { 
            display: flex; flex-direction: column; gap: 12px; 
            height: 55vh; overflow-y: auto; padding: 16px; 
            background: var(--bg-secondary); border-radius: var(--radius); margin-bottom: 12px; 
        }
        .ai-msg { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; max-width: 85%; word-wrap: break-word; }
        .ai-msg.user   { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg.bot    { background: var(--bg-card); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 2px; }
        .ai-msg.loading{ color: var(--text-muted); font-style: italic; align-self: flex-start; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo"><span class="logo-icon">⚔️</span><div><div class="logo-text">AlgojoGacor</div></div></div>
            <nav class="sidebar-nav">
                <a class="nav-item" href="/dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
                <a class="nav-item active" href="/pages/ai.html"><span class="nav-icon">🤖</span> AI Chat</a>
                <a class="nav-item" href="/pages/tools.html"><span class="nav-icon">🛠️</span> Tools</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info"><div class="user-avatar" id="sidebar-avatar">?</div><div><div class="user-name" id="sidebar-username">Loading...</div></div></div>
                <button class="btn btn-secondary btn-block btn-sm" onclick="logout()">🚪 Logout</button>
            </div>
        </aside>
        <div class="main-content">
            <header class="topbar">
                <div style="display:flex;align-items:center;gap:12px">
                    <button class="hamburger" onclick="toggleSidebar()">☰</button>
                    <span class="topbar-title">🤖 AI Assistant</span>
                </div>
            </header>
            <main class="content-area">
                <div class="card">
                    <div class="card-header">
                        <span class="icon">🤖</span>
                        <h3>AlgojoGacor AI</h3>
                        <span style="font-size:12px;color:var(--text-muted);margin-left:auto">Powered by OpenRouter & Pollinations</span>
                    </div>
                    <div class="form-group">
                        <label>Pilih Model AI (Hanya untuk Chat)</label>
                        <select class="form-input" id="ai-model">
                            <option value="openai/gpt-4o-mini">GPT-4o Mini (Cepat & Pintar)</option>
                            <option value="openai/gpt-4o">GPT-4o (Paling Jenius)</option>
                            <option value="anthropic/claude-3-haiku">Claude 3 Haiku (Puitis & Cepat)</option>
                            <option value="meta-llama/llama-3.1-8b-instruct:free">Llama 3.1 8B (Ringan)</option>
                        </select>
                    </div>
                    
                    <div class="ai-chat-area" id="ai-chat-area">
                        <div class="ai-msg bot">👋 Halo! Saya AlgojoGacor AI.<br><br>💡 <b>Tips:</b><br>- Chat biasa dikenakan biaya Rp50.000<br>- Bikin gambar dikenakan biaya Rp150.000</div>
                    </div>
                    
                    <div style="display:flex;gap:8px; align-items: stretch; flex-wrap: wrap;">
                        <input type="text" class="form-input" id="ai-input" style="flex: 1; min-width: 200px;" placeholder="Ketik pertanyaan atau deskripsi gambar..." onkeydown="if(event.key==='Enter') sendAI()">
                        <button class="btn btn-primary" onclick="sendAI()">💬 Chat (Rp50k)</button>
                        <button class="btn btn-success" style="color: black;" onclick="sendImagine()">🎨 Gambar (Rp150k)</button>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <div id="toast-container"></div>
    <script src="/js/api.js"></script>
    <script>
        if (typeof requireLogin === 'function' && !requireLogin()) throw new Error();
        const ME = typeof getUser === 'function' ? getUser() : { username: "Tamu" };
        
        document.addEventListener('DOMContentLoaded', () => {
            if (ME.username !== "Tamu") {
                document.getElementById('sidebar-username').textContent = ME.username;
                document.getElementById('sidebar-avatar').textContent   = ME.username[0].toUpperCase();
            }
        });

        // Fitur Chat Teks Biasa
        async function sendAI() {
            const input  = document.getElementById('ai-input');
            const model  = document.getElementById('ai-model').value;
            const msg    = input.value.trim();
            if (!msg) return;
            input.value  = '';

            const area = document.getElementById('ai-chat-area');
            area.innerHTML += `<div class="ai-msg user">${escHtml(msg)}</div>`;
            area.innerHTML += `<div class="ai-msg loading" id="ai-loading-chat">🤔 Memproses chat...</div>`;
            area.scrollTop = area.scrollHeight;

            try {
                const res = await api.post('/features/ai/chat', { message: msg, model });
                document.getElementById('ai-loading-chat')?.remove();
                
                if (res?.success) {
                    area.innerHTML += `<div class="ai-msg bot">${escHtml(res.reply).replace(/\n/g,'<br>')}</div>`;
                } else {
                    area.innerHTML += `<div class="ai-msg bot" style="color:var(--accent)">❌ ${escHtml(res?.message || 'Error dari server')}</div>`;
                }
            } catch (err) {
                document.getElementById('ai-loading-chat')?.remove();
                console.error("Chat error:", err);
                let errMsg = err?.response?.data?.message || err?.message || 'Gagal terhubung ke server.';
                if (typeof err === 'string') errMsg = err;
                area.innerHTML += `<div class="ai-msg bot" style="color:var(--accent)">❌ ${escHtml(errMsg)}</div>`;
            }
            area.scrollTop = area.scrollHeight;
        }

        // Fitur Generate Gambar
        async function sendImagine() {
            const input  = document.getElementById('ai-input');
            const msg    = input.value.trim();
            if (!msg) return;
            input.value  = '';

            const area = document.getElementById('ai-chat-area');
            area.innerHTML += `<div class="ai-msg user">🎨 Gambarkan: ${escHtml(msg)}</div>`;
            area.innerHTML += `<div class="ai-msg loading" id="ai-loading-img">🖌️ Sedang melukis gambar...</div>`;
            area.scrollTop = area.scrollHeight;

            try {
                const res = await api.post('/features/ai/imagine', { prompt: msg });
                document.getElementById('ai-loading-img')?.remove();
                
                if (res?.success) {
                    area.innerHTML += `
                    <div class="ai-msg bot">
                        Berikut adalah gambar dari: <b>${escHtml(res.prompt)}</b><br><br>
                        <img src="${res.imageUrl}" alt="AI Generated Image" 
                             style="max-width: 100%; border-radius: 10px; margin-top: 10px; background: #2a2d36; min-height: 200px;" 
                             onload="this.style.minHeight='auto'"
                             onerror="this.onerror=null; this.src=''; this.alt='❌ Gagal memuat gambar dari server. Coba prompt lain atau ulangi nanti.';" />
                    </div>
                    `;
                } else {
                    area.innerHTML += `<div class="ai-msg bot" style="color:var(--accent)">❌ ${escHtml(res?.message || 'Error')}</div>`;
                }
            } catch (err) {
                document.getElementById('ai-loading-img')?.remove();
                console.error("Imagine error:", err);
                
                // Menangkap pesan error asli dari backend (contoh: Saldo tidak cukup)
                let errorMsg = 'Gagal membuat gambar.';
                if (err?.response?.data?.message) {
                    errorMsg = err.response.data.message;
                } else if (err?.message) {
                    errorMsg = err.message;
                } else if (typeof err === 'string') {
                    errorMsg = err;
                }

                area.innerHTML += `<div class="ai-msg bot" style="color:var(--accent)">❌ ${escHtml(errorMsg)}</div>`;
            }
            area.scrollTop = area.scrollHeight;
        }

        // Fungsi aman untuk render teks
        function escHtml(s) { 
            return String(s||'').replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#x27;'}[c])); 
        }
    </script>
</body>
</html>
