<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlgojoGacor — Crypto</title>
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/dashboard.css" />
    <script src="/js/api.js"></script>
  </head>
  <body>
    <div class="app-layout">
      <!-- Sidebar (fetched from component) -->
      <div id="sidebar-container"></div>

      <!-- Main -->
      <div class="main-content">
        <header class="topbar">
          <div style="display: flex; align-items: center; gap: 12px">
            <button class="hamburger" onclick="toggleSidebar()">☰</button>
            <span class="topbar-title">Crypto</span>
          </div>
          <div style="font-size: 13px; color: var(--text-secondary)">
            Saldo:
            <span
              id="top-balance"
              style="font-weight: 700; color: var(--accent-green)"
              >...</span
            >
          </div>
        </header>

        <main class="content-area">
          <div class="card">
            <div class="card-header">
              <span class="icon">₿</span>
              <h3>Crypto Dashboard</h3>
            </div>
            <p style="color: var(--text-secondary)">.</p>
          </div>
        </main>
      </div>
    </div>

    <div id="toast-container"></div>
    <script src="/js/api.js"></script>
    <script src="/component/sidebarFetch.js"></script>
  </body>
</html>
